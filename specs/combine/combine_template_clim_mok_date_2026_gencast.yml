# ==============================================================================
# Spec for combining climatology (IMD), NGCM, and AIFS  forecasts at the 2 degree grid cell level
# combine_template_clim_mok_date_2025.yml
# Feeds into 3_combine_forecasts.R
# ------------------------------------------------------------------------------
# This YAML provides specs to produce data formatted for input into Monsoon Onset models
# ==============================================================================


type: "combine_forecasts"

input:
  # onset date output (from 1_process_raw_nc_files.R with type ground_truth_rainfall)
  #ground_truth_wide_rds: "Monsoon_Data/Processed_Data/Models/wet_spell/imd_clim_mok_date_wide.pkl"
  ground_truth_wide_rds: "Monsoon_Data/Processed_Data/Models/dry_spell/imd_clim_mok_date_wide.pkl"

  climatologies:
    clim:
      rds: "Monsoon_Data/Processed_Data/2026/imd_clim_mok_date_clim_issue.pkl"
      out_prefix: "clim_p_onset"
    clim_unc:
      rds: "Monsoon_Data/Processed_Data/2026/imd_clim_mok_date_clim_unc_issue.pkl"
      out_prefix: "clim_unc_p_onset"




options:
  join: "inner"   # "inner" (default) or "full" (inner join only keeps forecast dates/lats/lons where all forecasts are available

  # How to label the plus bin, if max_day=28 -> "day_29plus"
  plus_label_template: "day_{plus}plus"

  #only include forecasts up to the true onset date (needed for onset forecasts)
  trim_forecasts_after_true_onset: true
  # Which prob column from rainfall_forecast to use by default
  # (stage-2 long has predicted_prob, predicted_prob_clim_mok_date, predicted_prob_mok)
  default_prob_col: "predicted_prob"

forecasts:
  gencast:
  #aifs_ens:
    max_day: 45
    sources:
      - file: "Monsoon_Data/Processed_Data/2026/gencast_2026_wide.pkl"
      #- file: "Monsoon_Data/Processed_Data/2026/aifs_ens_2026_wide.pkl"
        years: "2026:2026"

    #constant variables are constant per lat/lon/initialization date
    # daily variables have different values for each day
    constants:
      - {col: "onset_thresh", out: "onset_thresh"}   # -> gencast_onset_thresh 
      - {col: "mok_date",     out: "mok_date"}       # -> gencast_mok_date

    daily: #add_plus: add a "day_29plus" version which is 1- sum of others. 
      # add_plus generally makes sense for onset probabilites but not other things.
      - {col: "predicted_prob",      out: "p_onset", add_plus: true} 
      - {col: "predicted_prob_clim_mok_date",      out: "p_onset_clim_mok_date", add_plus: true} 
      - {col: "predicted_prob_mok",      out: "p_onset_mok", add_plus: true} 
      - {col: "forecast_rain",       out: "rain_mean", add_plus: false}

  aifs:
    max_day: 45
    sources:
      - file: "Monsoon_Data/Processed_Data/2026/aifs_2026_wide.pkl"
        years: "2026:2026"
        prob_col: "predicted_prob_clim_mok_date"   # override per-source (optional)
    daily: #add_plus: add a "day_29plus" version which is 1- sum of others. 
      # add_plus generally makes sense for onset probabilites but not other things.
      - {col: "predicted_prob",      out: "p_onset", add_plus: true} 
      - {col: "predicted_prob_mok",      out: "p_onset_mok", add_plus: true} 
      - {col: "predicted_prob_clim_mok_date",      out: "p_onset_clim_mok_date", add_plus: true} 
      - {col: "forecast_rain",       out: "rain_mean", add_plus: false}

#options for climatology files (same for all files)
climatology:
  max_day: 28
  # optional override if climatology uses a different prob column name
  prob_col: "predicted_prob"

output:
  out_dir: "Monsoon_Data/Processed_Data/2026"
  # basename derived from spec_id

