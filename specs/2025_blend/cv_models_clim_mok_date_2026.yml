run:
  cutoff_mode: "clim_mok_date"
  MR: true
  #training_years: [2019, 2020, 2021, 2022]
  #cv_holdout_years: [2019, 2020, 2021, 2022]
  training_years: [2000,2001,2002,2003,2004,2005,2006,
                  2007,2008,2009,2010,
                  2011,2012,2013,2014,2015,2016,2017,2018,2019,2020,2021,2022]
  cv_holdout_years: [2026]

  pipeline_input_dir: "dry_spell_aifs_aifs_ens"
  #pipeline_input_dir: "dry_spell_aifs_gencast"
  #pipeline_output_dir: "dry_spell_aifs_gencast"
  #pipeline_output_dir: "dry_spell_aifs_gencast_box6"
  pipeline_output_dir: "2026"

cv:
  methods: ["global"]

cell:
  #dissemination: "Monsoon_Data/dissemination_cells_box6.csv"
  dissemination: "Monsoon_Data/dissemination_cells.csv"

models:
  formulas:
#    #ngcm_blend:
#    aifs_ens_blend:
#      enabled: true
#      text: "outcome ~ prob_clim_mr_qx * diff_ngcm_qx"

#    int_all:
#      enabled: true
#      text: "outcome ~ prob_clim_mr_qx * diff_ngcm_qx * diff_aifs_qx"

#    add_blend:
#      enabled: true
#      text: "outcome ~ prob_clim_mr_qx + diff_ngcm_qx + diff_aifs_qx"

    blended_model:
      enabled: true
      text: "outcome ~ prob_clim_mr_qx * diff_aifs_ens_qx * diff_aifs_qx"
      #text: "outcome ~ prob_clim_mr_qx * diff_ngcm_qx * diff_aifs_qx"
      #text: "outcome ~ prob_clim_mr_qx * diff_ngcm_qx * diff_aifs_qx + min_ngcm_10day_qx + min_aifs_10day_qx"

  window_variants:
    enabled: false
    only_if_cutoff_mode: "mok"
    base_name: "blended_model"
    start_years: [1900]
    end_year: 2026
    include_baseline_1900: true
    replace:
      from: "prob_clim_mr_qx"
      to: "prob_clim_mr{window}_qx"

mme:
  enabled: false
  variants: ["clim_mok_date"]
  mc_cores: 25
  blend_models:
    - name: clim_raw
      source: clim
    #- name: ngcm
    - name: aifs_ens
      source: forecast
      cal_variant: clim_mok_date
    - name: aifs
      source: forecast
      cal_variant: clim_mok_date

extras:
  clim_logits:
    - name: unc_clim_raw
      base_col_prefix: prob_clim_mr_unc
      earlier_col: prob_clim_mr_unc_earlier   
      earlier_is_logit: true

    - name: clim_raw
      base_col_prefix: prob_clim_mr
      window_start_years: [1900]
      window_end_year: 2026



  forecasts:
    #- name: ngcm
    - name: aifs_ens 
      variant: clim_mok_date
      raw: true
      calibrated: true
      fair_brier: true
      export_platt_weights: true
    - name: aifs
      variant: clim_mok_date
      raw: false
      calibrated: true

  forecast_variants:
    base: ""
    clim_mok_date: "_clim_mok_date"
